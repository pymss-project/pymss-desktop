name: Release macOS Packages

on:
  workflow_call:
    inputs:
      version:
        description: Release version
        required: true
        type: string

jobs:
  macos-gpu-dmg:
    name: macOS DMG bundled runtime / MLX default
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    env:
      PYMSS_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout pymss core
        uses: actions/checkout@v4
        with:
          repository: pymss-project/pymss
          path: pymss-core

      - uses: ./.github/actions/setup-release-env

      - name: Prepare embedded Python runtime with PyTorch + MLX support
        working-directory: .
        env:
          TORCH_VERSION: "2.7.1"
          TORCH_INDEX_URL: ""
        run: bash scripts/prepare-python-runtime.sh mlx pymss-core

      - name: Verify prepared macOS runtime
        run: |
          test -f python-runtime/bin/python3
          test -d python-runtime/lib/python3.12
          if otool -L python-runtime/bin/python3 | grep -q '/Library/Frameworks/Python.framework/Versions/'; then
            echo "Standalone runtime unexpectedly links system Python framework"
            otool -L python-runtime/bin/python3
            exit 1
          fi
          PYTHONDONTWRITEBYTECODE=1 PYTHONHOME="$PWD/python-runtime" python-runtime/bin/python3 -c "import sys, ssl, pymss_core; print(sys.prefix); print('ssl ok'); print('pymss_core ok')"

      - name: Install macOS bundled tools
        run: brew install ffmpeg aria2

      - name: Copy clean resources for Tauri bundling
        run: |
          mkdir -p src-tauri/resources
          rm -rf src-tauri/resources/python src-tauri/resources/python-runtime src-tauri/resources/pymss src-tauri/resources/bin
          mkdir -p src-tauri/resources/python
          rsync -a --exclude '__pycache__' --exclude '*.pyc' python/ src-tauri/resources/python/
          cp -R python-runtime src-tauri/resources/python-runtime
          mkdir -p src-tauri/resources/pymss
          rsync -a --exclude '.git' --exclude '.github' --exclude '.claude' --exclude '.omc' --exclude '.spec-workflow' --exclude '__pycache__' --exclude '*.pyc' pymss-core/ src-tauri/resources/pymss/
          bash scripts/prepare-macos-bundled-tools.sh src-tauri/resources/bin

      - name: Build Tauri app bundle
        working-directory: .
        run: |
          python3 - <<'PY' > src-tauri/tauri.bundle.resources.json
          import json
          from pathlib import Path

          root = Path.cwd()
          print(json.dumps({
              "bundle": {
                  "resources": {
                      str((root / "src-tauri" / "resources" / "python").resolve()): "python",
                      str((root / "src-tauri" / "resources" / "python-runtime").resolve()): "python-runtime",
                      str((root / "src-tauri" / "resources" / "pymss").resolve()): "pymss",
                      str((root / "src-tauri" / "resources" / "bin").resolve()): "bin",
                  }
              }
          }))
          PY
          pnpm tauri build --bundles app --config src-tauri/tauri.bundle.resources.json

      - name: Re-sign bundled macOS app after embedding runtime
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name 'Pymss Studio.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "Pymss Studio.app not found"
            exit 1
          fi
          bash scripts/resign-macos-app.sh "$APP"

      - name: Verify bundled macOS resources
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name 'Pymss Studio.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "Pymss Studio.app not found"
            exit 1
          fi

          RES="$APP/Contents/Resources"
          test -f "$RES/python/worker.py" || test -f "$RES/resources/python/worker.py"
          test -d "$RES/python-runtime" || test -d "$RES/resources/python-runtime"
          test -f "$RES/pymss/__init__.py" || test -f "$RES/pymss/pymss/__init__.py" || test -f "$RES/resources/pymss/__init__.py" || test -f "$RES/resources/pymss/pymss/__init__.py"
          test -x "$RES/bin/ffmpeg" || test -x "$RES/resources/bin/ffmpeg"
          test -x "$RES/bin/aria2c" || test -x "$RES/resources/bin/aria2c"
          PY="$RES/python-runtime/bin/python3"
          WORKER="$RES/python/worker.py"
          if [ ! -f "$WORKER" ]; then
            WORKER="$RES/resources/python/worker.py"
          fi
          BIN="$RES/bin"
          if [ ! -x "$BIN/ffmpeg" ]; then
            BIN="$RES/resources/bin"
          fi
          test -f "$PY"
          test -f "$WORKER"
          test -x "$BIN/ffmpeg"
          test -x "$BIN/ffprobe"
          test -x "$BIN/aria2c"
          "$BIN/ffmpeg" -version
          "$BIN/ffprobe" -version
          "$BIN/aria2c" --version
          test -d "$RES/python-runtime/lib/python3.12"
          if otool -L "$PY" | grep -q '/Library/Frameworks/Python.framework/Versions/'; then
            echo "Bundled app runtime unexpectedly links system Python framework: $PY"
            otool -L "$PY"
            exit 1
          fi
          PYTHONDONTWRITEBYTECODE=1 PYTHONHOME="$RES/python-runtime" "$PY" -c "import sys, ssl, pymss_core; print(sys.prefix); print('ssl ok'); print('pymss_core ok')"
          PATH="$BIN:$PATH" PYTHONDONTWRITEBYTECODE=1 PYTHONHOME="$RES/python-runtime" "$PY" -c "import shutil; assert shutil.which('ffmpeg'); assert shutil.which('aria2c'); print('bundled tools ok')"
          PATH="$BIN:$PATH" PYTHONDONTWRITEBYTECODE=1 PYTHONHOME="$RES/python-runtime" "$PY" "$WORKER" env_info
          PATH="$BIN:$PATH" PYTHONDONTWRITEBYTECODE=1 PYTHONHOME="$RES/python-runtime" "$PY" "$WORKER" list_models --payload "{}"
          codesign --verify --deep --strict --verbose=4 "$APP"

      - name: Build DMG with hdiutil
        run: |
          VERSION="${PYMSS_VERSION#v}"
          mkdir -p release
          APP=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name 'Pymss Studio.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "Pymss Studio.app not found"
            exit 1
          fi
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "Pymss Studio" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "release/Pymss-Studio-${VERSION}-macos-${{ matrix.arch }}-mlx.dmg"
          rm -rf "$STAGE"
          echo "PYMSS_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pymss-Studio-${{ env.PYMSS_VERSION }}-macos-${{ matrix.arch }}-mlx
          path: release/Pymss-Studio-${{ env.PYMSS_VERSION }}-macos-${{ matrix.arch }}-mlx.dmg
