name: Release Windows Packages

on:
  workflow_call:
    inputs:
      version:
        description: Release version
        required: true
        type: string

jobs:
  windows-cuda-prepare:
    name: Windows x64 CUDA prepare
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      stage_name: ${{ steps.meta.outputs.stage_name }}
      stage_artifact: ${{ steps.meta.outputs.stage_artifact }}
    env:
      PYMSS_VERSION_INPUT: ${{ inputs.version }}
      TORCH_VERSION: 2.7.1
      TORCH_INDEX_URL: https://download.pytorch.org/whl/cu128
    steps:
      - uses: actions/checkout@v4

      - name: Checkout pymss core
        uses: actions/checkout@v4
        with:
          repository: pymss-project/pymss
          path: pymss-core

      - uses: ./.github/actions/setup-release-env

      - name: Resolve package metadata
        id: meta
        shell: pwsh
        run: |
          $version = '${{ env.PYMSS_VERSION_INPUT }}'.TrimStart('v')
          $stageName = "Pymss-Studio-$version-windows-x64-cuda"
          $artifactName = "$stageName-stage"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "stage_name=$stageName" >> $env:GITHUB_OUTPUT
          echo "stage_artifact=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Prepare embedded CUDA Python runtime
        shell: pwsh
        run: ./scripts/prepare-python-runtime.ps1 -Variant cuda -TorchVersion $env:TORCH_VERSION -TorchIndexUrl $env:TORCH_INDEX_URL

      - name: Sync build version metadata
        shell: pwsh
        env:
          PYMSS_VERSION: ${{ steps.meta.outputs.version }}
        run: ./scripts/sync-build-version.ps1

      - name: Build Tauri production app
        run: pnpm tauri build --no-bundle

      - name: Prepare Windows bundled tools
        shell: pwsh
        run: |
          $bin = "release/bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null

          $ffmpegZip = "release/ffmpeg-release-essentials.zip"
          $ffmpegExtract = "release/ffmpeg"
          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile $ffmpegZip
          if (Test-Path $ffmpegExtract) { Remove-Item $ffmpegExtract -Recurse -Force }
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegExtract -Force
          $ffmpegBin = Get-ChildItem -Path $ffmpegExtract -Recurse -Directory -Filter "bin" |
            Where-Object { Test-Path (Join-Path $_.FullName "ffmpeg.exe") } |
            Select-Object -First 1
          if (-not $ffmpegBin) { throw "ffmpeg bin directory not found" }
          Copy-Item (Join-Path $ffmpegBin.FullName "ffmpeg.exe") "$bin/ffmpeg.exe" -Force
          Copy-Item (Join-Path $ffmpegBin.FullName "ffprobe.exe") "$bin/ffprobe.exe" -Force

          $aria2Zip = "release/aria2-1.37.0-win-64bit-build1.zip"
          $aria2Extract = "release/aria2"
          Invoke-WebRequest `
            -Uri "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip" `
            -OutFile $aria2Zip
          if (Test-Path $aria2Extract) { Remove-Item $aria2Extract -Recurse -Force }
          Expand-Archive -Path $aria2Zip -DestinationPath $aria2Extract -Force
          $aria2Exe = Get-ChildItem -Path $aria2Extract -Recurse -File -Filter "aria2c.exe" | Select-Object -First 1
          if (-not $aria2Exe) { throw "aria2c.exe not found" }
          Copy-Item $aria2Exe.FullName "$bin/aria2c.exe" -Force

          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "$bin/VC_redist.x64.exe"

      - name: Stage portable directory
        shell: pwsh
        run: |
          $version = '${{ steps.meta.outputs.version }}'
          $stage = "release/${{ steps.meta.outputs.stage_name }}"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "src-tauri/target/release/pymss-studio.exe" "$stage/Pymss Studio.exe"
          Copy-Item "python" "$stage/python" -Recurse
          Copy-Item "python-runtime" "$stage/python-runtime" -Recurse
          Copy-Item "release/bin" "$stage/bin" -Recurse
          $pymssSource = (Resolve-Path "pymss-core").Path
          robocopy $pymssSource "$stage\pymss" /E /XD .git .github .claude .omc .spec-workflow __pycache__ /XF *.pyc | Out-Host
          if ($LASTEXITCODE -gt 7) { throw "robocopy pymss-core failed with exit code $LASTEXITCODE" }
          $global:LASTEXITCODE = 0
          @"
          Pymss Studio $version Windows x64 CUDA
          Author: TheSmallHanCat

          This installer includes Python runtime, CUDA PyTorch, worker.py, and pymss source code.
          NVIDIA driver is required for GPU acceleration.
          "@ | Set-Content "$stage/README.txt" -Encoding UTF8
          & "$stage\python-runtime\python.exe" "$stage\python\worker.py" env_info
          if ($LASTEXITCODE -ne 0) { throw "Staged Python worker env_info failed with exit code $LASTEXITCODE" }
          & "$stage\python-runtime\python.exe" "$stage\python\worker.py" list_models --payload "{}"
          if ($LASTEXITCODE -ne 0) { throw "Staged Python worker list_models failed with exit code $LASTEXITCODE" }

      - name: Upload CUDA stage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.stage_artifact }}
          path: release/${{ steps.meta.outputs.stage_name }}
          compression-level: 0

  windows-cuda-7z:
    name: Windows x64 CUDA portable 7z
    runs-on: windows-latest
    needs: windows-cuda-prepare
    steps:
      - name: Download CUDA stage artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.windows-cuda-prepare.outputs.stage_artifact }}
          path: release/${{ needs.windows-cuda-prepare.outputs.stage_name }}

      - name: Build Windows portable 7z archive
        shell: pwsh
        run: |
          $version = '${{ needs.windows-cuda-prepare.outputs.version }}'
          $stageName = '${{ needs.windows-cuda-prepare.outputs.stage_name }}'
          if (Test-Path "release/$stageName.7z") { Remove-Item "release/$stageName.7z" -Force }
          Push-Location "release"
          & "C:\Program Files\7-Zip\7z.exe" a -t7z -m0=lzma2 -mx=5 -mfb=128 -md=768m -ms=on -mf=BCJ2 -mmt=on "$stageName.7z" "$stageName"
          Pop-Location

      - name: Upload Windows portable archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pymss-Studio-${{ needs.windows-cuda-prepare.outputs.version }}-windows-x64-cuda-portable
          path: release/${{ needs.windows-cuda-prepare.outputs.stage_name }}.7z

  windows-cuda-exe:
    name: Windows x64 CUDA setup exe
    runs-on: windows-latest
    needs: windows-cuda-prepare
    env:
      PYMSS_VERSION: ${{ needs.windows-cuda-prepare.outputs.version }}
      PYMSS_PACKAGE_SUFFIX: windows-x64-cuda
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install Inno Setup Chinese language file
        shell: pwsh
        run: |
          $languages = "C:\Program Files (x86)\Inno Setup 6\Languages"
          New-Item -ItemType Directory -Force -Path $languages | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/kira-96/Inno-Setup-Chinese-Simplified-Translation/master/ChineseSimplified.isl" `
            -OutFile (Join-Path $languages "ChineseSimplified.isl")
          if (!(Test-Path (Join-Path $languages "ChineseSimplified.isl"))) {
            throw "ChineseSimplified.isl was not installed"
          }

      - name: Download CUDA stage artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.windows-cuda-prepare.outputs.stage_artifact }}
          path: release/${{ needs.windows-cuda-prepare.outputs.stage_name }}

      - name: Build Inno Setup installer with LZMA2
        shell: pwsh
        run: |
          $stageFull = (Resolve-Path "release/${{ needs.windows-cuda-prepare.outputs.stage_name }}").Path
          $releaseFull = (Resolve-Path "release").Path
          $env:PYMSS_PORTABLE_DIR = $stageFull
          $env:PYMSS_INSTALLER_OUTPUT = $releaseFull
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\pymss-studio.iss"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pymss-Studio-${{ needs.windows-cuda-prepare.outputs.version }}-windows-x64-cuda-setup
          path: release/Pymss-Studio-${{ needs.windows-cuda-prepare.outputs.version }}-windows-x64-cuda-setup.exe

  windows-cpu-prepare:
    name: Windows x64 CPU prepare
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      stage_name: ${{ steps.meta.outputs.stage_name }}
      stage_artifact: ${{ steps.meta.outputs.stage_artifact }}
    env:
      PYMSS_VERSION_INPUT: ${{ inputs.version }}
      TORCH_VERSION: 2.7.1
      TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
    steps:
      - uses: actions/checkout@v4

      - name: Checkout pymss core
        uses: actions/checkout@v4
        with:
          repository: pymss-project/pymss
          path: pymss-core

      - uses: ./.github/actions/setup-release-env

      - name: Resolve package metadata
        id: meta
        shell: pwsh
        run: |
          $version = '${{ env.PYMSS_VERSION_INPUT }}'.TrimStart('v')
          $stageName = "Pymss-Studio-$version-windows-x64-cpu"
          $artifactName = "$stageName-stage"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "stage_name=$stageName" >> $env:GITHUB_OUTPUT
          echo "stage_artifact=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Prepare embedded CPU Python runtime
        shell: pwsh
        run: ./scripts/prepare-python-runtime.ps1 -Variant default -TorchVersion $env:TORCH_VERSION -TorchIndexUrl $env:TORCH_INDEX_URL

      - name: Sync build version metadata
        shell: pwsh
        env:
          PYMSS_VERSION: ${{ steps.meta.outputs.version }}
        run: ./scripts/sync-build-version.ps1

      - name: Build Tauri production app
        run: pnpm tauri build --no-bundle

      - name: Prepare Windows bundled tools
        shell: pwsh
        run: |
          $bin = "release/bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null

          $ffmpegZip = "release/ffmpeg-release-essentials.zip"
          $ffmpegExtract = "release/ffmpeg"
          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile $ffmpegZip
          if (Test-Path $ffmpegExtract) { Remove-Item $ffmpegExtract -Recurse -Force }
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegExtract -Force
          $ffmpegBin = Get-ChildItem -Path $ffmpegExtract -Recurse -Directory -Filter "bin" |
            Where-Object { Test-Path (Join-Path $_.FullName "ffmpeg.exe") } |
            Select-Object -First 1
          if (-not $ffmpegBin) { throw "ffmpeg bin directory not found" }
          Copy-Item (Join-Path $ffmpegBin.FullName "ffmpeg.exe") "$bin/ffmpeg.exe" -Force
          Copy-Item (Join-Path $ffmpegBin.FullName "ffprobe.exe") "$bin/ffprobe.exe" -Force

          $aria2Zip = "release/aria2-1.37.0-win-64bit-build1.zip"
          $aria2Extract = "release/aria2"
          Invoke-WebRequest `
            -Uri "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip" `
            -OutFile $aria2Zip
          if (Test-Path $aria2Extract) { Remove-Item $aria2Extract -Recurse -Force }
          Expand-Archive -Path $aria2Zip -DestinationPath $aria2Extract -Force
          $aria2Exe = Get-ChildItem -Path $aria2Extract -Recurse -File -Filter "aria2c.exe" | Select-Object -First 1
