name: Release GPU Packages

'on':
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "0.0.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-cuda:
    name: Windows x64 CUDA Inno Setup
    runs-on: windows-latest
    env:
      PYMSS_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      TORCH_VERSION: 2.7.1
      TORCH_INDEX_URL: https://download.pytorch.org/whl/cu128
    steps:
      - uses: actions/checkout@v4

      - name: Checkout pymss core
        uses: actions/checkout@v4
        with:
          repository: pymss-project/pymss
          path: pymss-core

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install Inno Setup Chinese language file
        shell: pwsh
        run: |
          $languages = "C:\Program Files (x86)\Inno Setup 6\Languages"
          New-Item -ItemType Directory -Force -Path $languages | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/kira-96/Inno-Setup-Chinese-Simplified-Translation/master/ChineseSimplified.isl" `
            -OutFile (Join-Path $languages "ChineseSimplified.isl")
          if (!(Test-Path (Join-Path $languages "ChineseSimplified.isl"))) {
            throw "ChineseSimplified.isl was not installed"
          }
      - name: Install frontend dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Prepare embedded CUDA Python runtime
        working-directory: .
        shell: pwsh
        run: ./scripts/prepare-python-runtime.ps1 -Variant cuda -TorchVersion $env:TORCH_VERSION -TorchIndexUrl $env:TORCH_INDEX_URL

      - name: Build Tauri production app
        working-directory: .
        run: pnpm tauri build --no-bundle

      - name: Stage portable directory
        shell: pwsh
        run: |
          $version = '${{ env.PYMSS_VERSION }}'.TrimStart('v')
          $stage = "release/Pymss-Studio-$version-windows-x64-cuda"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "src-tauri/target/release/pymss-studio.exe" "$stage/Pymss Studio.exe"
          Copy-Item "python" "$stage/python" -Recurse
          Copy-Item "python-runtime" "$stage/python-runtime" -Recurse
          $pymssSource = (Resolve-Path "pymss-core").Path
          robocopy $pymssSource "$stage\pymss" /E /XD .git .github .claude .omc .spec-workflow __pycache__ /XF *.pyc | Out-Host
          if ($LASTEXITCODE -gt 7) { throw "robocopy pymss-core failed with exit code $LASTEXITCODE" }
          $global:LASTEXITCODE = 0
          @"
          Pymss Studio $version Windows x64 CUDA
          Author: TheSmallHanCat

          This installer includes Python runtime, CUDA PyTorch, worker.py, and pymss source code.
          NVIDIA driver is required for GPU acceleration.
          "@ | Set-Content "$stage/README.txt" -Encoding UTF8
          & "$stage\python-runtime\python.exe" "$stage\python\worker.py" env_info
          if ($LASTEXITCODE -ne 0) { throw "Staged Python worker env_info failed with exit code $LASTEXITCODE" }
          & "$stage\python-runtime\python.exe" "$stage\python\worker.py" list_models --payload "{}"
          if ($LASTEXITCODE -ne 0) { throw "Staged Python worker list_models failed with exit code $LASTEXITCODE" }
          $stageFull = (Resolve-Path $stage).Path
          $releaseFull = (Resolve-Path "release").Path
          echo "PYMSS_PORTABLE_DIR=$stageFull" >> $env:GITHUB_ENV
          echo "PYMSS_INSTALLER_OUTPUT=$releaseFull" >> $env:GITHUB_ENV
          echo "PYMSS_VERSION=$version" >> $env:GITHUB_ENV

      - name: Build Windows portable zip
        shell: pwsh
        run: |
          $version = '${{ env.PYMSS_VERSION }}'
          $stage = "release/Pymss-Studio-$version-windows-x64-cuda"
          $zip = "release/Pymss-Studio-$version-windows-x64-cuda.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$stage\*" -DestinationPath $zip -CompressionLevel Optimal

      - name: Build Inno Setup installer with LZMA
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\pymss-studio.iss"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pymss-Studio-${{ env.PYMSS_VERSION }}-windows-x64-cuda-setup
          path: release/Pymss-Studio-${{ env.PYMSS_VERSION }}-windows-x64-cuda-setup.exe

      - name: Upload Windows portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pymss-Studio-${{ env.PYMSS_VERSION }}-windows-x64-cuda-portable
          path: release/Pymss-Studio-${{ env.PYMSS_VERSION }}-windows-x64-cuda.zip

  linux-cuda:
    name: Linux x64 CUDA tar.zst
    runs-on: ubuntu-22.04
    env:
      PYMSS_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      TORCH_VERSION: 2.7.1
      TORCH_INDEX_URL: https://download.pytorch.org/whl/cu128
    steps:
      - uses: actions/checkout@v4

      - name: Checkout pymss core
        uses: actions/checkout@v4
        with:
          repository: pymss-project/pymss
          path: pymss-core

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        run: |
          # GitHub-hosted Ubuntu images may include a Google Chrome apt source.
          # It is unrelated to this build and occasionally fails during mirror sync,
          # which would otherwise break apt-get update for all packages.
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf zstd

      - name: Install frontend dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Prepare embedded CUDA Python runtime
        working-directory: .
        run: bash scripts/prepare-python-runtime.sh cuda

      - name: Build Tauri production binary
        working-directory: .
        run: pnpm tauri build --no-bundle

      - name: Stage Linux package
        run: |
          VERSION="${PYMSS_VERSION#v}"
          STAGE="release/Pymss-Studio-${VERSION}-linux-x64-cuda"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp src-tauri/target/release/pymss-studio "$STAGE/Pymss Studio"
          cp -R python "$STAGE/python"
          cp -R python-runtime "$STAGE/python-runtime"
          cp -R pymss-core "$STAGE/pymss"
          cat > "$STAGE/README.txt" <<EOF
          Pymss Studio ${VERSION} Linux x64 CUDA
          Author: TheSmallHanCat

          Run ./Pymss\ Studio after extracting.
          NVIDIA driver is required for GPU acceleration.
          EOF
          tar --zstd -cf "release/Pymss-Studio-${VERSION}-linux-x64-cuda.tar.zst" -C "release" "Pymss-Studio-${VERSION}-linux-x64-cuda"
          echo "PYMSS_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pymss-Studio-${{ env.PYMSS_VERSION }}-linux-x64-cuda
          path: release/Pymss-Studio-${{ env.PYMSS_VERSION }}-linux-x64-cuda.tar.zst

  macos-gpu-dmg:
    name: macOS DMG bundled runtime / MPS-capable
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      PYMSS_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout pymss core
        uses: actions/checkout@v4
        with:
          repository: pymss-project/pymss
          path: pymss-core

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Prepare embedded Python runtime with PyTorch MPS support
        working-directory: .
        env:
          TORCH_VERSION: "2.7.1"
          TORCH_INDEX_URL: ""
        run: bash scripts/prepare-python-runtime.sh cuda

      - name: Copy clean resources for Tauri bundling
        run: |
          mkdir -p src-tauri/resources
          rm -rf src-tauri/resources/python-runtime src-tauri/resources/pymss
          cp -R python-runtime src-tauri/resources/python-runtime
          mkdir -p src-tauri/resources/pymss
          rsync -a --exclude '.git' --exclude '.github' --exclude '.claude' --exclude '.omc' --exclude '.spec-workflow' --exclude '__pycache__' --exclude '*.pyc' pymss-core/ src-tauri/resources/pymss/

      - name: Build Tauri app bundle
        working-directory: .
        env:
          TAURI_CONFIG: '{"bundle":{"resources":["../python/*","resources/python-runtime","resources/pymss"]}}'
        run: pnpm tauri build --bundles app

      - name: Build DMG with hdiutil
        run: |
          VERSION="${PYMSS_VERSION#v}"
          mkdir -p release
          APP=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name 'Pymss Studio.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "Pymss Studio.app not found"
            exit 1
          fi
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "Pymss Studio" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "release/Pymss-Studio-${VERSION}-macos-${{ matrix.arch }}-mps.dmg"
          rm -rf "$STAGE"
          echo "PYMSS_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pymss-Studio-${{ env.PYMSS_VERSION }}-macos-${{ matrix.arch }}-mps
          path: release/Pymss-Studio-${{ env.PYMSS_VERSION }}-macos-${{ matrix.arch }}-mps.dmg

  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows-cuda, linux-cuda, macos-gpu-dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*


